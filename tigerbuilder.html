<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- Same stack as adrianpunks.com -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  /* ---- AdrianPunks theme variables (mirrors index.html) ---- */
  :root{
    --bg-color:#f8f9fa; --text-color:#333333; --card-bg:#ffffff; --border-color:#dee2e6;
    --muted:#6c757d; --accent:#ff6b2b; --accent-2:#ff8142; --accent-ink:#1a0f06;
    --thumb-bg:#e9ecef;
  }
  body{background-color:var(--bg-color);color:var(--text-color);padding-top:70px}
  .card{background-color:var(--card-bg);border-color:var(--border-color);color:var(--text-color)}
  .card-header{background-color:transparent;border-color:var(--border-color);font-weight:600;
    display:flex;justify-content:space-between;align-items:center}
  .card-header .val{color:var(--accent)}
  .text-muted-2{color:var(--muted)!important}

  .btn-tiger{background:var(--accent);border:1px solid var(--accent);color:var(--accent-ink);font-weight:600}
  .btn-tiger:hover{background:var(--accent-2);border-color:var(--accent-2);color:var(--accent-ink)}

  .pagehead{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .pagehead h1{font-size:1.6rem;margin:0}
  .pagehead .tg{color:var(--accent)}

  /* preview */
  .stage{position:sticky;top:84px}
  @media(max-width:991px){.stage{position:static}}
  #view{width:100%;aspect-ratio:1/1;display:block;border-radius:8px;image-rendering:pixelated;background:#111}
  .seedline{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-top:8px}
  .seedline code{color:var(--accent)}

  /* chips & segmented */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:6px 12px;border:1px solid var(--border-color);border-radius:20px;background:var(--card-bg);
    color:var(--text-color);font-size:.8rem;cursor:pointer;transition:.12s}
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:600}
  .seg{display:flex;gap:6px}.seg .chip{flex:1;text-align:center}

  /* category accordion */
  .cat{border-bottom:1px solid var(--border-color)}.cat:last-child{border-bottom:none}
  .cat .head{padding:10px 4px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .cat .head .pick{color:var(--accent);font-size:.8rem;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
  .cat .head .name i{transition:.2s}.cat.open .head .name i{transform:rotate(90deg)}
  .cat .grid{display:none;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:8px;padding:6px 0 12px}
  .cat.open .grid{display:grid}
  .thumb{aspect-ratio:1/1;border:2px solid var(--border-color);border-radius:6px;overflow:hidden;cursor:pointer;
    background:var(--thumb-bg);position:relative}
  .thumb img{width:100%;height:100%;image-rendering:pixelated;object-fit:cover}
  .thumb.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,107,43,.35)}
  .thumb.none{display:flex;align-items:center;justify-content:center;font-size:.62rem;color:var(--muted)}
  .thumb .lbl{position:absolute;bottom:0;left:0;right:0;font-size:.52rem;background:rgba(0,0,0,.7);color:#fff;
    padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* traits + gallery */
  .traits .row{display:flex;justify-content:space-between;border-bottom:1px dashed var(--border-color);padding:3px 0;font-size:.82rem}
  .traits .row span:last-child{color:var(--accent)}
  .gallery{display:flex;gap:8px;overflow-x:auto;padding:2px 0}
  .gallery .gi{position:relative;flex:0 0 auto}
  .gallery img{width:70px;height:70px;border-radius:6px;border:1px solid var(--border-color);image-rendering:pixelated;cursor:pointer}
  .gallery .del{position:absolute;top:-6px;right:-6px;background:#000;border:1px solid var(--border-color);color:#fff;
    border-radius:50%;width:18px;height:18px;font-size:.7rem;line-height:15px;text-align:center;cursor:pointer}

  .form-switch .form-check-input:checked{background-color:var(--accent);border-color:var(--accent)}
  .toast-mini{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-ink);
    padding:10px 18px;border-radius:6px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:1100}
  .toast-mini.show{opacity:1}
  #loader{position:fixed;inset:0;background:var(--bg-color);display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:14px;z-index:1200;color:var(--text-color)}
  #loader .bar{width:220px;height:6px;background:var(--border-color);border-radius:4px;overflow:hidden}
  #loader .bar i{display:block;height:100%;width:0;background:var(--accent);transition:.2s}
</style>
</head>
<body>
<div id="loader"><div>🐯 Loading traits…</div><div class="bar"><i id="lbar"></i></div></div>

<!-- Shared AdrianPunks menu -->
<div id="menu-container"></div>

<div class="container">
  <div class="pagehead">
    <h1><span class="tg">🐯 Tiger</span>Punks <span class="text-muted-2" style="font-size:1rem">Builder</span></h1>
  </div>

  <div class="row g-4">
    <!-- PREVIEW -->
    <div class="col-lg-5">
      <div class="stage">
        <div class="card shadow-sm">
          <div class="card-body">
            <canvas id="view" width="1080" height="1080"></canvas>
            <div class="seedline"><span>seed</span><code id="seed">—</code></div>
            <div class="d-grid gap-2 mt-3">
              <button class="btn btn-tiger" id="btnRand"><i class="bi bi-shuffle"></i> Surprise me</button>
              <div class="row g-2">
                <div class="col-6"><button class="btn btn-outline-secondary w-100" id="btnDownload"><i class="bi bi-download"></i> PNG</button></div>
                <div class="col-6"><button class="btn btn-outline-secondary w-100" id="btnSVG"><i class="bi bi-filetype-svg"></i> SVG</button></div>
                <div class="col-6"><button class="btn btn-outline-secondary w-100" id="btnSave"><i class="bi bi-star"></i> Save</button></div>
                <div class="col-6"><button class="btn btn-outline-secondary w-100" id="btnShare"><i class="bi bi-share"></i> Share</button></div>
              </div>

          </div>
        </div>

    <!-- CONTROLS -->
    <div class="col-lg-7">
      <div class="card shadow-sm mb-3">
        <div class="card-header">Mode <span class="val" id="modeVal">Dark</span></div>
        <div class="card-body"><div class="chips" id="modeChips"></div></div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-header">Punk <span class="val" id="punkVal">Adrian</span></div>
        <div class="card-body"><div class="cat"><div class="grid" id="punkGrid" style="display:grid"></div></div></div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-header">Traits</div>
        <div class="card-body py-1" id="cats"></div>
      </div>

      <div class="card shadow-sm mb-3">

          <div class="traits" id="traits"></div>
          <button class="btn btn-sm btn-outline-secondary w-100 mt-2" id="btnCopy"><i class="bi bi-clipboard"></i> Copy attributes (JSON)</button>
        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-header">My Gallery</div>
        <div class="card-body"><div class="gallery" id="gallery"></div></div>
      </div>
    </div>
  </div>

  <footer class="text-center text-muted-2 py-4" style="font-size:.8rem">
    TigerPunks · by HalfxTiger · <a href="https://adrianpunks.com">adrianpunks.com</a> · v2 (new model · off-chain)
  </footer>
</div>

<div class="toast-mini" id="toast"></div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Shared menu loader (same pattern as index.html) -->
<script>
  fetch('components/menu.html')
    .then(r=>r.text())
    .then(html=>{
      const c=document.getElementById('menu-container');c.innerHTML=html;
      c.querySelectorAll('script[src="menu.js"]').forEach(s=>{
        const n=document.createElement('script');n.src='components/menu.js';n.async=false;document.head.appendChild(n);s.remove();
      });
    }).catch(e=>console.error('menu load',e));
</script>

<!-- Builder engine -->
<script>
const SIZE=1080, GKEY='tigerpunks_gallery';
const VERSION='20260623a';                       // bump to bust CDN/browser cache on asset updates
const bust=u=>u+(u.includes('?')?'&':'?')+'v='+VERSION;
const $=s=>document.querySelector(s), ce=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
let M=null, IMG={}, state={mode:'dark', punk:'adrian', sel:{}};

/* ---- new-model helpers (Mode / Punk / Tiger-variant / Hoodie rule) ---- */
function punkOpt(id){return (M.punk.options.find(p=>p.id===id))||M.punk.options[0];}
function isTigerPunk(){return (M.punk.tigerIds||[]).includes(state.punk);}
function catDir(c){return (isTigerPunk()&&c.tigerDir)?c.tigerDir:c.dir;}      // art folder for current punk
function catCfg(id){return M.categories.find(c=>c.id===id);}
function hoodieRule(){return (M.rules&&M.rules.hoodieNoMisc)||null;}
function hatIsHoodie(){const r=hoodieRule();if(!r)return false;const f=state.sel[r.cat];if(!f)return false;return lbl(catCfg(r.cat),f)===r.value;}
function miscDisabled(){const r=hoodieRule();return !!(r&&hatIsHoodie());}    // Misc blocked while Hat=Hoodie

/* PRNG */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let seed=0, rng=mulberry32(1);
function reseed(s){seed=s>>>0;rng=mulberry32(seed);$('#seed').textContent='#'+seed;}

function load(src){return new Promise(res=>{if(IMG[src])return res(IMG[src]);const im=new Image();im.onload=()=>{IMG[src]=im;res(im);};im.onerror=()=>res(null);im.src=bust(src);});}

async function boot(){
  M=await (await fetch(bust('tigerpunks/manifest.json'))).json();
  const all=[];
  M.punk.options.forEach(o=>all.push(M.punk.dir+'/'+o.file));            // 7 full-art punk faces
  M.categories.forEach(c=>c.options.forEach(o=>{
    all.push(c.dir+'/'+o.file);
    if(c.tigerDir)all.push(c.tigerDir+'/'+o.file);                       // tiger-variant art
  }));
  let done=0;
  await Promise.all(all.map(p=>load(p).then(()=>{done++;$('#lbar').style.width=(done/all.length*100)+'%';})));
  buildUI();randomize();$('#loader').style.display='none';
}

/* Mode = solid background colour */
function drawBg(ctx,id){const m=M.modes.find(m=>m.id===id)||M.modes[0];ctx.fillStyle=m.color;ctx.fillRect(0,0,SIZE,SIZE);}

/* z-order: Mode(bg) > Punk > Beard > Mouth > Hair > Hat > Eye > Top > Misc.
   Tiger/White-Tiger punks pull Beard/Hair/Hat/Eye/Misc from the Tiger-* art. */
function render(){
  const ctx=$('#view').getContext('2d');ctx.clearRect(0,0,SIZE,SIZE);
  drawBg(ctx,state.mode);
  const pim=IMG[M.punk.dir+'/'+punkOpt(state.punk).file];if(pim)ctx.drawImage(pim,0,0,SIZE,SIZE);
  M.categories.forEach(c=>{
    if(c.id==='Misc'&&miscDisabled())return;                            // Hoodie hat -> no misc
    const v=state.sel[c.id];if(!v)return;const dir=catDir(c);
    (c.multi?v:[v]).forEach(file=>{const im=IMG[dir+'/'+file];if(im)ctx.drawImage(im,0,0,SIZE,SIZE);});
  });
  updateTraits();
}

function buildUI(){
  // Mode chips (solid colour swatch)
  const mc=$('#modeChips');
  M.modes.forEach(m=>{const el=ce('div','chip'+(m.id===state.mode?' active':''));el.textContent=m.label;
    el.style.borderLeft='10px solid '+m.color;
    el.onclick=()=>{state.mode=m.id;$('#modeVal').textContent=m.label;[...mc.children].forEach(c=>c.classList.remove('active'));el.classList.add('active');render();};mc.appendChild(el);});
  // Punk grid (full-art faces, required single-select)
  const pg=$('#punkGrid');
  M.punk.options.forEach(o=>{const t=ce('div','thumb'+(o.id===state.punk?' active':''));t.dataset.id=o.id;
    const img=ce('img');img.src=bust(M.punk.dir+'/'+o.file);img.loading='lazy';t.appendChild(img);
    const l=ce('div','lbl');l.textContent=o.label;t.appendChild(l);
    t.onclick=()=>{state.punk=o.id;$('#punkVal').textContent=o.label;[...pg.children].forEach(x=>x.classList.remove('active'));t.classList.add('active');render();};
    pg.appendChild(t);});
  // Categories
  const wrap=$('#cats');
  M.categories.forEach((c,idx)=>{
    const cat=ce('div','cat');cat.dataset.cid=c.id;const head=ce('div','head');
    head.innerHTML=`<span class="name"><i class="bi bi-chevron-right"></i> ${c.label}${c.multi?' <span class="text-muted-2" style="font-size:.7rem">(multi)</span>':''}</span><span class="pick" id="pick-${c.id}">${c.optional?'None':''}</span>`;
    const grid=ce('div','grid');
    if(c.optional&&!c.multi){const none=ce('div','thumb none active');none.textContent='None';none.dataset.file='';none.onclick=()=>selectThumb(c,none,'');grid.appendChild(none);}
    c.options.forEach(o=>{const t=ce('div','thumb');t.dataset.file=o.file;const img=ce('img');img.src=bust(c.dir+'/'+o.file);img.loading='lazy';t.appendChild(img);const lbl=ce('div','lbl');lbl.textContent=o.label;t.appendChild(lbl);t.onclick=()=>selectThumb(c,t,o.file);grid.appendChild(t);});
    head.onclick=()=>{if(cat.classList.contains('disabled'))return;cat.classList.toggle('open');};cat.appendChild(head);cat.appendChild(grid);wrap.appendChild(cat);if(idx<2)cat.classList.add('open');});
  $('#btnRand').onclick=()=>randomize();$('#btnDownload').onclick=download;$('#btnSVG').onclick=downloadSVG;$('#btnSave').onclick=saveToGallery;$('#btnShare').onclick=share;$('#btnCopy').onclick=copyTraits;
  renderGallery();
}

/* Hoodie rule: when Hat=Hoodie, clear+disable the Misc category in the UI */
function refreshHoodie(){
  const cat=document.querySelector('#cats .cat[data-cid="Misc"]');if(!cat)return;
  if(miscDisabled()){
    state.sel.Misc=[];
    cat.classList.add('disabled','o-50');cat.classList.remove('open');
    cat.style.opacity='.45';cat.style.pointerEvents='none';
    const pick=cat.querySelector('.pick');if(pick)pick.textContent='Disabled (Hoodie)';
    [...cat.querySelectorAll('.thumb')].forEach(t=>t.classList.remove('active'));
  }else{
    cat.classList.remove('disabled');cat.style.opacity='';cat.style.pointerEvents='';
    const pick=cat.querySelector('.pick');if(pick&&pick.textContent==='Disabled (Hoodie)')pick.textContent='None';
  }
}

function selectThumb(c,el,file){
  if(c.id==='Misc'&&miscDisabled())return;                              // blocked by Hoodie rule
  const grid=el.parentElement;
  if(c.multi){el.classList.toggle('active');const set=new Set(state.sel[c.id]||[]);if(set.has(file))set.delete(file);else set.add(file);state.sel[c.id]=[...set];
    $('#pick-'+c.id).textContent=state.sel[c.id].length?state.sel[c.id].map(f=>lbl(c,f)).join(', '):'None';}
  else{[...grid.children].forEach(x=>x.classList.remove('active'));el.classList.add('active');state.sel[c.id]=file||null;$('#pick-'+c.id).textContent=file?lbl(c,file):'None';}
  if(c.id===((hoodieRule()||{}).cat))refreshHoodie();                   // Hat changed -> re-eval Misc lock
  render();
}
function lbl(c,file){const o=c.options.find(o=>o.file===file);return o?o.label:file;}

function randomize(s){
  reseed(s!==undefined?s:Math.floor(Math.random()*1e9));
  state.mode=M.modes[Math.floor(rng()*M.modes.length)].id;
  state.punk=M.punk.options[Math.floor(rng()*M.punk.options.length)].id;
  state.sel={};
  M.categories.forEach(c=>{                                             // Hat precedes Misc in z-order, so Hoodie is known by the Misc step
    if(c.id==='Misc'){state.sel.Misc=miscDisabled()?[]:c.options.filter(()=>rng()<0.18).map(o=>o.file);}
    else if(c.multi){state.sel[c.id]=c.options.filter(()=>rng()<0.18).map(o=>o.file);}
    else if(c.optional&&rng()<0.25){state.sel[c.id]=null;}
    else state.sel[c.id]=c.options[Math.floor(rng()*c.options.length)].file;});
  syncUI();render();
}
function syncUI(){
  $('#modeVal').textContent=(M.modes.find(m=>m.id===state.mode)||{}).label||state.mode;
  [...$('#modeChips').children].forEach(el=>el.classList.toggle('active',el.textContent===$('#modeVal').textContent));
  $('#punkVal').textContent=punkOpt(state.punk).label||'';
  [...$('#punkGrid').children].forEach(el=>el.classList.toggle('active',el.dataset.id===state.punk));
  M.categories.forEach(c=>{const grid=document.querySelectorAll('#cats .cat')[M.categories.indexOf(c)].querySelector('.grid');const sel=state.sel[c.id];
    [...grid.children].forEach(t=>{const f=t.dataset.file;if(c.multi)t.classList.toggle('active',(sel||[]).includes(f));else t.classList.toggle('active',(f||'')===(sel||''));});
    $('#pick-'+c.id).textContent=c.multi?((sel&&sel.length)?sel.map(f=>lbl(c,f)).join(', '):'None'):(sel?lbl(c,sel):'None');});
  refreshHoodie();
}

function traitsObj(){
  const o={Mode:(M.modes.find(m=>m.id===state.mode)||{}).label, Punk:punkOpt(state.punk).label};
  M.categories.forEach(c=>{const s=state.sel[c.id];o[c.label]=c.multi?((s&&s.length)?s.map(f=>lbl(c,f)).join(' + '):'None'):(s?lbl(c,s):'None');});return o;
}
function updateTraits(){const o=traitsObj(),el=$('#traits');el.innerHTML='';Object.entries(o).forEach(([k,v])=>{const r=ce('div','row');r.innerHTML=`<span>${k}</span><span>${v}</span>`;el.appendChild(r);});}
function copyTraits(){navigator.clipboard.writeText(JSON.stringify({seed,name:'TigerPunk #'+seed,attributes:traitsObj()},null,2));toast('Attributes copied');}

function exportCanvas(badge){
  const c=ce('canvas');c.width=c.height=SIZE;const x=c.getContext('2d');x.drawImage($('#view'),0,0);
  if(badge){x.font='bold 22px system-ui,Arial';x.textBaseline='bottom';const t='TigerPunks · HalfxTiger';const w=x.measureText(t).width;
    x.fillStyle='rgba(0,0,0,.45)';x.fillRect(14,SIZE-40,w+22,30);x.fillStyle='#ff6b2b';x.fillText(t,24,SIZE-16);}
  return c;
}
function download(){const c=exportCanvas(true),a=ce('a');a.download='TigerPunk-'+seed+'.png';a.href=c.toDataURL('image/png');a.click();toast('PNG downloaded');}

/* SVG export (svgmaker technique): downsample to GRID, one <rect> per opaque pixel — on-chain ready */
const SVG_GRID=72;
function buildSVG(){
  const g=ce('canvas');g.width=g.height=SVG_GRID;const gx=g.getContext('2d');gx.imageSmoothingEnabled=false;
  gx.drawImage($('#view'),0,0,SVG_GRID,SVG_GRID);
  const d=gx.getImageData(0,0,SVG_GRID,SVG_GRID).data;
  let rects='';
  for(let y=0;y<SVG_GRID;y++)for(let x=0;x<SVG_GRID;x++){
    const i=(y*SVG_GRID+x)*4,a=d[i+3];if(a<128)continue;
    rects+=`<rect x="${x}" y="${y}" width="1.02" height="1.02" fill="rgb(${d[i]},${d[i+1]},${d[i+2]})"/>`;
  }
  return `<?xml version="1.0" encoding="UTF-8"?>\n<!-- TigerPunk #${seed} -->\n`+
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${SVG_GRID} ${SVG_GRID}" shape-rendering="crispEdges">\n${rects}\n</svg>`;
}
function downloadSVG(){
  const blob=new Blob([buildSVG()],{type:'image/svg+xml'});const a=ce('a');
  a.download='TigerPunk-'+seed+'.svg';a.href=URL.createObjectURL(blob);a.click();toast('SVG downloaded (on-chain ready)');
}

function thumbURL(){const c=ce('canvas');c.width=c.height=240;c.getContext('2d').drawImage($('#view'),0,0,240,240);return c.toDataURL('image/png');}
function getGallery(){try{return JSON.parse(localStorage.getItem(GKEY)||'[]');}catch(e){return[];}}
function saveToGallery(){const g=getGallery();g.unshift({seed,thumb:thumbURL(),state:JSON.parse(JSON.stringify(state))});localStorage.setItem(GKEY,JSON.stringify(g.slice(0,24)));renderGallery();toast('Saved to gallery');}
function renderGallery(){
  const g=getGallery(),el=$('#gallery');el.innerHTML='';
  if(!g.length){el.innerHTML='<div class="text-muted-2" style="font-size:.82rem">You haven\'t saved any TigerPunk yet.</div>';return;}
  g.forEach((it,i)=>{const wrap=ce('div','gi');const img=ce('img');img.src=it.thumb;img.title='#'+it.seed+' — click to load';
    img.onclick=()=>{state=JSON.parse(JSON.stringify(it.state));seed=it.seed;$('#seed').textContent='#'+seed;syncUI();render();toast('Loaded #'+it.seed);};
    const del=ce('div','del');del.textContent='×';del.onclick=ev=>{ev.stopPropagation();const gg=getGallery();gg.splice(i,1);localStorage.setItem(GKEY,JSON.stringify(gg));renderGallery();};
    wrap.appendChild(img);wrap.appendChild(del);el.appendChild(wrap);});
}

async function share(){
  const c=exportCanvas(true);
  c.toBlob(async blob=>{
    const file=new File([blob],'TigerPunk-'+seed+'.png',{type:'image/png'});
    const text='Just created my TigerPunk #'+seed+' 🐯 at adrianpunks.com';
    if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],text,title:'TigerPunk #'+seed});}catch(e){}}
    else{const a=ce('a');a.download=file.name;a.href=URL.createObjectURL(blob);a.click();
      window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text+' #TigerPunks #AdrianPunks'),'_blank');toast('Image downloaded — attach it to the tweet');}
  },'image/png');
}

let tt;function toast(m){const el=$('#toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),1800);}

boot();
</script>
