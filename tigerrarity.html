<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TigerPunks · Rarity</title>
<style>
  :root{--bg:#0e0e10;--panel:#17171b;--border:#2a2a30;--text:#e8e8ea;--muted:#9a9aa2;--accent:#ff8a3d;--bar:#3a2f22}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.45}
  .wrap{max-width:880px;margin:0 auto;padding:32px 20px 64px}
  h1{font-size:1.5rem;margin:0 0 4px}h1 .tg{color:var(--accent)}
  p.lede{color:var(--muted);margin:0 0 20px}
  .bar-meta{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:.78rem;margin-bottom:18px}
  .bar-meta b{color:var(--text)}
  .cols{column-width:380px;column-gap:22px}
  .cat{break-inside:avoid;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:0 0 18px}
  .cat h2{font-size:.95rem;margin:0 0 10px;color:var(--accent);display:flex;justify-content:space-between}
  .cat h2 small{color:var(--muted);font-weight:400}
  .drow{display:grid;grid-template-columns:1fr 90px;align-items:center;gap:8px;margin:5px 0;font-size:.78rem}
  .dname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dbar{grid-column:1/3;height:7px;background:#0c0c0e;border-radius:4px;overflow:hidden;margin-top:-2px}
  .dbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#b5641f)}
  .dn{justify-self:end;color:var(--muted);font-variant-numeric:tabular-nums}
  .pct{color:var(--text)}
  .controls{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
  input[type=file]{color:var(--muted);font-size:.78rem}
  a{color:var(--accent)}
  .note{color:var(--muted);font-size:.74rem;margin-top:24px}
  code{background:#0c0c0e;border:1px solid var(--border);border-radius:5px;padding:1px 5px}
</style></head>
<body><div class="wrap">
  <h1><span class="tg">Tiger</span>Punks · Rarity</h1>
  <p class="lede">Trait frequencies computed from the exact set that's on-chain — not an off-chain guess.</p>
  <div class="controls">
    <span class="muted" style="font-size:.78rem">Source:</span>
    <span id="src" class="muted" style="font-size:.78rem">tigerpunks-rarity.json</span>
    <input type="file" id="file" accept="application/json" title="load a rarity report">
  </div>
  <div class="bar-meta" id="meta"></div>
  <div class="cols" id="cats"></div>
  <p class="note">Generated by <code>gen_data.py</code> alongside the on-chain bake, so these numbers match
    <code>tokenURI</code> attributes exactly. Verify the set itself on the <a href="tigerprovenance.html">provenance</a> page.</p>
</div>

<script>
const $=s=>document.querySelector(s);
const ORDER=['Punk','Mode','Top','Beard','Hair','Hat','Mouth','Eye','Misc','TraitCount'];
function render(r){
  const N=r.supply||1;
  $('#meta').innerHTML=`<span>supply <b>${N.toLocaleString()}</b></span>`+
    (r.masterSeed!=null?`<span>seed <b>${r.masterSeed}</b></span>`:'')+
    (r.provenance?`<span>provenance <b title="${r.provenance}">${r.provenance.slice(0,10)}…</b></span>`:'');
  const host=$('#cats'); host.innerHTML='';
  for(const cat of ORDER){
    const counts=r[cat]; if(!counts) continue;
    const entries=Object.entries(counts).sort((a,b)=>a[1]-b[1]); // rarest first
    const max=Math.max(1,...entries.map(e=>e[1]));
    const box=document.createElement('div'); box.className='cat';
    box.innerHTML=`<h2>${cat}<small>${entries.length} variants</small></h2>`;
    for(const [name,n] of entries){
      const pct=(100*n/N);
      const row=document.createElement('div'); row.className='drow';
      row.innerHTML=`<span class="dname" title="${name}">${name}</span>`+
        `<span class="dn"><span class="pct">${pct.toFixed(pct<1?2:1)}%</span> · ${n}</span>`+
        `<span class="dbar"><i style="width:${Math.max(2,100*n/max)}%"></i></span>`;
      box.appendChild(row);
    }
    host.appendChild(box);
  }
}
$('#file').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=()=>{try{render(JSON.parse(rd.result));$('#src').textContent=f.name;}catch{alert('Invalid rarity JSON');}};rd.readAsText(f);});
(async()=>{ try{ render(await (await fetch('tigerpunks-rarity.json')).json()); }
  catch{ $('#meta').innerHTML='<span class="muted">Load a rarity report JSON to begin →</span>'; } })();
</script>
</body></html>
